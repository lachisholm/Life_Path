version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:3001
    command: npm run dev
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    environment:
      - PORT=3001
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_USER=your@email.com
      - SMTP_PASS=yourpassword
      - SESSION_SECRET=your-session-secret
    command: npm run dev
