{% extends 'base.html' %}
{% block content %}
<h1>Subscriptions</h1>
<div class="grid cards">
  {% for key, plan in plans.items() %}
  <article class="plan-card">
    <h2>{{ plan['name'] }}</h2>
    <p class="price">{{ plan['price'] }}</p>
    <p>{{ plan['details'] }}</p>
    {% if key == 'free' %}
    <a class="btn" href="{{ url_for('main.dashboard') }}">Start 30-day trial</a>
    {% else %}
    <a class="btn" href="{{ url_for('main.checkout_page', plan=key) }}">Choose plan</a>
    {% endif %}
  </article>
  {% endfor %}
</div>
{% endblock %}
