{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <h1>Build your mission with Life Path</h1>
  <p>Goal mapping for individuals, families, and teams.</p>
  <p>
    <a class="btn" href="{{ url_for('main.dashboard') }}">Start planning</a>
    <a class="btn btn-outline" href="{{ url_for('main.pricing') }}">See plans</a>
  </p>
</section>

<section class="grid cards" aria-label="Feature highlights">
  <button class="flip-card" type="button" aria-label="Flip purpose card">
    <span class="flip-card-inner">
      <span class="flip-card-front">Purpose</span>
      <span class="flip-card-back">Map goals to milestones and dates.</span>
    </span>
  </button>
  <button class="flip-card" type="button" aria-label="Flip progress card">
    <span class="flip-card-inner">
      <span class="flip-card-front">Progress</span>
      <span class="flip-card-back">Track steps, resources, and notes.</span>
    </span>
  </button>
  <button class="flip-card" type="button" aria-label="Flip leadership card">
    <span class="flip-card-inner">
      <span class="flip-card-front">Leadership</span>
      <span class="flip-card-back">Manage goals across your whole team.</span>
    </span>
  </button>
</section>
{% endblock %}
