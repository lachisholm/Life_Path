{% extends 'base.html' %}
{% block content %}
<h1>Create Goal</h1>
<form method="post" class="stack">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>Person
    <select name="person_id" required>
      {% for person in people %}
      <option value="{{ person['id'] }}">{{ person['name'] }} ({{ person['role'] }})</option>
      {% endfor %}
    </select>
  </label>
  <label>Goal title <input name="title" required></label>
  <label>Description <textarea name="description" required></textarea></label>
  <label>Resources <textarea name="resources"></textarea></label>
  <label>Start date <input name="start_date" type="date"></label>
  <label>Target completion <input name="target_date" type="date"></label>
  <label>Goal notes <textarea name="goal_notes"></textarea></label>
  <label>Link to future goal
    <select name="future_goal_id">
      <option value="">No linked future goal</option>
      {% for goal in all_goals %}
      <option value="{{ goal['id'] }}">{{ goal['title'] }}</option>
      {% endfor %}
    </select>
  </label>
  <button class="btn" type="submit">Save goal</button>
</form>
{% endblock %}
