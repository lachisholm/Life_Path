{% extends 'base.html' %}
{% block content %}
<h1>Cart</h1>
<p>Select a plan and continue to secure checkout.</p>
<ul>
  {% for key, plan in plans.items() if key != 'free' %}
  <li>
    <strong>{{ plan['name'] }}</strong> — {{ plan['price'] }}
    <a class="btn" href="{{ url_for('main.checkout_page', plan=key) }}">Checkout</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
